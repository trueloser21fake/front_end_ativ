<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Login Ufac</title>

        <link rel="stylesheet" href="../css/reset.css">
        <link rel="stylesheet" href="../css/style.css">
        <link rel="stylesheet" href="../css/login.css">
        <link rel="shortcut icon" href="../assets/ícones/Dashboard/logo.svg" type="image/x-icon">
        
        <script src="../js/code.js"></script>
    </head>
    <body>
        <main class="login-main">
            <div class="login-sec">
                <div class="container-login-imgs" >              
                    <div class="container-login-logo">
                        <img src="../assets/student.jpg" alt="Logo da Ufac" class="login-img">
                    </div>
                </div>
                
                <form action="portal_aluno.html" class="login">
                    <div class="container-login-logo">
                        <img src="../assets/Logo Ufac (2).svg" alt="Estudantes" class="login-logo">
                        <h1 class="login-title">Bem Vindo !</h1>
                    </div>
                        <div class="container_element_login">
                            <div class="login_fields">
                                <div class="login-elements">
                                    <input type="text" placeholder="000.000.000-00" required class="login-input">                          
                                </div>

                                <div class="login-elements">
                                    <input type="password" placeholder="*********" required class="login-input">
                                    <a href="#" class="login-esqueci-senha">Esqueci minha Senha</a>
                                </div>
                            </div>
                        <div class="container_login-button">
                            <button class="login-button">
                                <a class="login-dash">Entrar</a>
                            </button>
                        </div>   
                    </div>
                </form>
            </div>
        </main>
    </body>
</html>
